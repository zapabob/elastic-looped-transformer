# Smoke-test config: ~10M params on a toy corpus.
# Use for verifying the full ELT + ILSD pipeline runs end-to-end.

model:
  vocab_size: 248320          # Qwen3.5 tokenizer
  d_model: 256
  n_unique_layers: 4
  n_heads: 8
  head_dim: 32
  d_ff: 768
  max_seq_len: 512
  rope_theta: 10000.0
  tie_word_embeddings: true
  L_min: 1
  L_max: 2
  grad_checkpoint: false

ilsd:
  enabled: true
  lambda_init: 1.0
  lambda_final: 0.0
  lambda_anneal_steps: 2000
  warmup_steps: 200
  strict_student_below_teacher: true

data:
  train_bin: H:/elt_data/bin/train.bin
  val_bin: H:/elt_data/bin/val.bin
  seq_len: 512
  tokenizer_path: H:/Qwen3.5-9B-official-hf

lr: 3.0e-4
min_lr: 3.0e-5
weight_decay: 0.1
beta1: 0.9
beta2: 0.96
eps: 1.0e-8
grad_clip: 1.0

warmup_steps: 200
total_steps: 10
lr_schedule: cosine

micro_batch_size: 4
grad_accum_steps: 4

dtype: bf16

log_every: 10
eval_every: 500
save_every: 1000
run_dir: runs/tiny_10M

# Rolling ckpt: every 5 min, 3 slots. Override with --override rolling_ckpt_interval_sec=30 for tests.
rolling_ckpt_interval_sec: 300
rolling_ckpt_keep: 3

seed: 42
