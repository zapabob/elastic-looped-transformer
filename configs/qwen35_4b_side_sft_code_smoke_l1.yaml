# Short SFT wiring smoke for the HF-backed Qwen3.5-4B ELT side branch.
# This is intentionally tiny: it verifies checkpoint + code-lane bin + loss wiring
# without starting long post-training.

model:
  backbone_kind: hf_qwen35_looped
  hf_model_path: huihui-ai/Huihui-Qwen3.5-4B-Claude-4.6-Opus-abliterated
  source_model_id: huihui-ai/Huihui-Qwen3.5-4B-Claude-4.6-Opus-abliterated
  language_only: true
  freeze_vision: true
  import_lm_head: true
  parity_dtype: bf16
  d_model: 2560
  n_unique_layers: 32
  n_heads: 16
  n_kv_heads: 4
  head_dim: 256
  d_ff: 9216
  max_seq_len: 262144
  rope_theta: 10000000.0
  tie_word_embeddings: false
  L_min: 1
  L_max: 1
  loop_bootstrap_L_max: 1
  hf_trainable_mode: norm_lm_head
  hf_trainable_top_layers: 0
  grad_checkpoint: false

ilsd:
  enabled: false

data:
  train_bin: H:/elt_data/posttrain/code/qwen35_hauhaucs/bin/train.bin
  val_bin: H:/elt_data/posttrain/code/qwen35_hauhaucs/bin/val.bin
  seq_len: 128
  tokenizer_path: H:/Qwen3.5-9B-official-hf

optim:
  kind: nvme_adamw

offload:
  root: H:/elt_data/runs/qwen35_4b_side_sft_code_smoke_l1/offload_nvme
  min_free_gb: 20.0

lr: 1.0e-6
min_lr: 1.0e-7
weight_decay: 0.0
beta1: 0.9
beta2: 0.95
eps: 1.0e-8
grad_clip: 1.0

warmup_steps: 1
total_steps: 1
lr_schedule: cosine

micro_batch_size: 1
grad_accum_steps: 1

dtype: bf16

log_every: 1
eval_every: 1
save_every: 1
run_dir: H:/elt_data/runs/qwen35_4b_side_sft_code_smoke_l1

rolling_ckpt_interval_sec: 300
rolling_ckpt_keep: 3

seed: 60
