tasks:
  - name: physics_reasoning
    description: create physics reasoning cases with real choices, quantitative constraints, and a clear best answer
    target_kind: mcq_reasoning
    tags: [physics, mechanics, quantitative_reasoning]
    variants:
      - mechanics problem combining forces, energy conservation, and dimensional checks
      - circuits or fields problem requiring qualitative and quantitative elimination
      - waves, optics, or sound problem with one misleading distractor
      - units, orders of magnitude, or scaling argument across multiple constraints
  - name: chemistry_reasoning
    description: create chemistry reasoning cases with real distractors and verifier-friendly final choices
    target_kind: mcq_reasoning
    tags: [chemistry, reactions, scientific_reasoning]
    variants:
      - stoichiometry or balancing reactions with a numerical or limiting-reagent clue
      - acids, bases, pH, or buffer reasoning with plausible distractors
      - bonding, polarity, or intermolecular forces with structure-property reasoning
      - thermochemistry, kinetics, or equilibrium with one tempting misconception
  - name: biology_reasoning
    description: create biology and biomedical reasoning cases that stay educational and avoid patient-specific advice
    target_kind: mcq_reasoning
    tags: [biology, medicine, life_science, biomedical_reasoning]
    variants:
      - genetics and inheritance with probability or mechanism reasoning
      - cell biology, metabolism, or molecular pathway reasoning
      - physiology or biomedical mechanism question without diagnosis, dosage, or treatment instructions
      - ecology, evolution, or epidemiology with causal and statistical interpretation
  - name: cs_and_statistics_reasoning
    description: create computer science, statistics, and engineering reasoning cases with real technical choices
    target_kind: mcq_reasoning
    tags: [computer_science, statistics, engineering]
    variants:
      - algorithm complexity, data structures, or systems tradeoff reasoning
      - networking, operating systems, or reliability concepts
      - sampling, bias, hypothesis testing, or causal inference
      - probability interpretation, experimental design, or measurement uncertainty
