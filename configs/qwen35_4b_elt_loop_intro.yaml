model:
  backbone_kind: hf_qwen35_looped
  hf_model_path: huihui-ai/Huihui-Qwen3.5-4B-Claude-4.6-Opus-abliterated
  source_model_id: huihui-ai/Huihui-Qwen3.5-4B-Claude-4.6-Opus-abliterated
  language_only: true
  freeze_vision: true
  import_lm_head: true
  parity_dtype: fp32
  d_model: 2560
  n_unique_layers: 32
  n_heads: 16
  n_kv_heads: 4
  head_dim: 256
  d_ff: 9216
  max_seq_len: 262144
  rope_theta: 10000000.0
  tie_word_embeddings: false
  L_min: 1
  L_max: 2
  loop_bootstrap_L_max: 1
  hf_trainable_mode: top_layers
  hf_trainable_top_layers: 4
  grad_checkpoint: false

ilsd:
  enabled: true
  lambda_init: 1.0
  lambda_final: 0.0
  lambda_anneal_steps: 4000
  warmup_steps: 500
  strict_student_below_teacher: true
  distill_teacher_temp: 1.2
  distill_uniform_mix: 0.001
  entropy_floor_weight: 0.01
  entropy_floor_start: 0.16
  entropy_floor_end: 0.08
  entropy_curvature_weight: 0.01
  logit_curvature_weight: 0.0
  logit_curvature_max_positions: 0
  uncertainty_entropy_min: 0.55
  uncertainty_top2_gap_max: 0.15
  local_consistency_weight: 0.01
  local_consistency_metric: cosine

data:
  train_bin: H:/elt_data/bin/train.bin
  val_bin: H:/elt_data/bin/val.bin
  seq_len: 256
  tokenizer_path: H:/Qwen3.5-9B-official-hf

optim:
  kind: paged_adamw_8bit
  paged_bits: 8
  paged_percentile_clipping: 100

lr: 2.0e-5
min_lr: 2.0e-6
weight_decay: 0.1
beta1: 0.9
beta2: 0.95
eps: 1.0e-8
grad_clip: 1.0

warmup_steps: 200
total_steps: 4000
lr_schedule: cosine

micro_batch_size: 1
grad_accum_steps: 8

dtype: bf16

log_every: 10
eval_every: 200
save_every: 500
run_dir: H:/elt_data/runs/qwen35_4b_elt_loop_intro

rolling_ckpt_interval_sec: 300
rolling_ckpt_keep: 3

seed: 42
