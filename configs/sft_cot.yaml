# Phase 2 — Chain-of-Thought SFT on top of the Phase 1 base.
# Reuses the ILSD objective with a small-step schedule and a CoT-heavy corpus.
# Resumes from runs/base_100M/last.pt via --resume.

model:
  vocab_size: 248320
  d_model: 768
  n_unique_layers: 12
  n_heads: 12
  head_dim: 64
  d_ff: 2048
  max_seq_len: 2048
  rope_theta: 10000.0
  tie_word_embeddings: true
  L_min: 1
  L_max: 4
  grad_checkpoint: true

ilsd:
  enabled: true
  lambda_init: 0.5          # CoT phase: student and teacher already close
  lambda_final: 0.0
  lambda_anneal_steps: 8000
  warmup_steps: 200
  strict_student_below_teacher: true

data:
  # Phase 2 uses the CoT-heavy bin built from SFT-only manifest:
  # run: scripts/build_train_bin.py --config scripts/sft_manifest.yaml
  #   (math + code CoT + teacher distillation from Qwen3.5-4B)
  train_bin: H:/elt_data/bin/sft_train.bin
  val_bin: H:/elt_data/bin/sft_val.bin
  seq_len: 2048
  tokenizer_path: H:/Qwen3.5-9B-official-hf

lr: 1.0e-4
min_lr: 1.0e-5
weight_decay: 0.1
beta1: 0.9
beta2: 0.96
eps: 1.0e-8
grad_clip: 1.0

warmup_steps: 200
total_steps: 12000
lr_schedule: cosine

micro_batch_size: 2
grad_accum_steps: 16

dtype: bf16

log_every: 20
eval_every: 500
save_every: 1000
run_dir: runs/sft_cot

rolling_ckpt_interval_sec: 300
rolling_ckpt_keep: 3

seed: 43
