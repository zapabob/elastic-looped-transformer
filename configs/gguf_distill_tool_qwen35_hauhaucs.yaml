lane: tool_use

tasks:
  - name: shell_selection
    description: choose an appropriate shell-like tool call for filesystem or process inspection
    target_kind: json_match
    tags: [shell_command, filesystem]
    variants:
      - inspect files in a workspace
      - search for matching text or filenames
      - run a short diagnostic command
      - summarize git status or repository state
  - name: python_tool_selection
    description: choose a Python execution tool call for lightweight computation or transformation
    target_kind: json_match
    tags: [python_exec, scripting]
    variants:
      - transform or aggregate structured data
      - parse JSON and compute a small summary
      - evaluate a numerical expression or algorithm
      - generate a compact derived artifact from text
  - name: web_lookup_selection
    description: choose a web or lookup tool call for retrieving current authoritative information
    target_kind: json_match
    tags: [web_search, retrieval]
    variants:
      - fetch an official documentation page
      - look up a recent public fact
      - retrieve a benchmark or model card
      - collect source-backed citations for a claim
  - name: structured_output_selection
    description: choose a structured tool call with precise JSON arguments
    target_kind: json_match
    tags: [json_match, function_calling]
    variants:
      - emit a validated JSON payload for a named tool
      - select the best function and arguments from a short user request
      - preserve schema correctness under minor ambiguity
      - avoid prose and output only the structured call
