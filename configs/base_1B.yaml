# Base 1B-class config for RTX 3060 12GB + Windows.
#
# Param budget (vocab=248,320, tie=true):
#   tok_embed:          248,320 × 1792        =  445.0 M
#   per-layer attention (no-bias):  4 × 1792² =   12.8 M
#   per-layer SwiGLU FFN:  3 × 1792 × 4864    =   26.1 M
#   per-layer RMSNorm×2:                      =    3.6 K
#   per-layer total:                          =   39.0 M
#   × 28 layers:                              = 1092.0 M
#   final RMSNorm:                            =    1.8 K
#   TOTAL:                                    ~ 1.54 B
#   NON-EMB:                                  ~ 1.09 B
#
# L=4 composite iterations ⇒ effective depth 28×4 = 112 layers ≈ 4.4 B FLOPs/tok.
#
# Memory (bf16 weights, fp32 opt state, fp32 master):
#   bf16 weights:                     3.1 GB
#   fp32 AdamW (m + v, non-emb):      8.7 GB
#   fp32 master (AMP, non-emb):       4.4 GB
#   activations (B=1, T=1024, ckpt):  ~1.5 GB
#   → naive total ~18.7 GB ⇒ does NOT fit 12 GB.
#
# Phase-B mitigation: optim.kind=paged_adamw_8bit (bitsandbytes). 8-bit state
# pages through CUDA managed memory, shaving ~6–7 GB. Combined with micro_batch=1
# + seq_len=1024 + grad_checkpoint + grad_accum=64, this fits in ~10 GB VRAM.
#
# Phase-C will replace paged_adamw_8bit with nvme_adamw (fp32 state on H:\).

model:
  vocab_size: 248320
  d_model: 1792
  n_unique_layers: 28
  n_heads: 28
  head_dim: 64
  d_ff: 4864
  max_seq_len: 2048
  rope_theta: 10000.0
  tie_word_embeddings: true
  L_min: 1
  L_max: 4
  grad_checkpoint: true

ilsd:
  enabled: true
  lambda_init: 1.0
  lambda_final: 0.0
  lambda_anneal_steps: 40000
  warmup_steps: 2000
  strict_student_below_teacher: true

data:
  train_bin: H:/elt_data/bin/train.bin
  val_bin: H:/elt_data/bin/val.bin
  seq_len: 1024                       # reduced from 2048 to shave activation memory
  tokenizer_path: H:/Qwen3.5-9B-official-hf

optim:
  kind: paged_adamw_8bit
  paged_bits: 8
  paged_percentile_clipping: 100

# Chinchilla: 1.09B non-emb × 20 tok/param ≈ 22B tokens.
# We have ~5–6B deduped tokens locally, so we'll under-train (~5 tok/param) —
# the L=4 loop adds ~4× effective depth so this is still Chinchilla-reasonable.
lr: 2.0e-4
min_lr: 2.0e-5
weight_decay: 0.1
beta1: 0.9
beta2: 0.95
eps: 1.0e-8
grad_clip: 1.0

warmup_steps: 2000
total_steps: 120000
lr_schedule: cosine

# Effective batch = 1 × 64 × 1024 = 65,536 tokens / step.
# 120k steps × 65.5k tok = 7.9 B tokens — covers 5–6B corpus × 1.3 passes.
micro_batch_size: 1
grad_accum_steps: 64

dtype: bf16

log_every: 20
eval_every: 1000
save_every: 2000
run_dir: H:/elt_data/runs/base_1B

rolling_ckpt_interval_sec: 300
rolling_ckpt_keep: 3

seed: 42
