name: synthetic_v2_aha_loop_self_distill
objective: >
  Use elastic loop depth plus output self-distillation to make reasoning gains
  before high-variance GRPO, while preserving the L=1 behavior as an anchor.

guardrails:
  max_first_pass_loop_depth: 3
  hold_l4_until_l3_eval_gain: true
  keep_l1_anchor: true
  fixed_verifier_required: true
  active_pipeline_mutation: false
  replay_mix_required_for_self_distill: true

failure_modes:
  divergence:
    controls:
      - grad_clip <= 0.5
      - strict_student_below_teacher
      - entropy_curvature_weight > 0
      - local_consistency_weight > 0
  gradient_vanishing:
    controls:
      - L2 before L3
      - lambda anneal leaves task loss dominant late
      - sample student loop depth below teacher loop depth
  local_stable_solution:
    controls:
      - hard bridge/easy-hard cases after the loop intro
      - keep verifier reward variance visible
      - short L3 stretch after L2 settles
  catastrophic_forgetting:
    controls:
      - LoRA-only updates
      - replay-mixed output distillation
      - KL-regularized GRPO after distillation

phases:
  - id: l2_math_ilsd_intro
    command: uv run --no-sync elt-train --config configs/qwen35_4b_side_lora_math_aha_ilsd_l2.yaml --resume H:/elt_data/runs/qwen35_4b_side_lora_math_sft_synthetic_gb/last.pt
    purpose: Stabilize math reasoning with L=2 teacher/student internal distillation.
    proceed_when:
      - val_loss is non-increasing over the last two evals
      - L_dist does not dominate task loss late
      - no checkpoint or CUDA instability
  - id: l2_stem_ilsd_intro
    command: uv run --no-sync elt-train --config configs/qwen35_4b_side_lora_stem_aha_ilsd_l2.yaml --resume H:/elt_data/runs/qwen35_4b_side_lora_stem_sft_synthetic_gb/last.pt
    purpose: Stabilize STEM multiple-choice reasoning with L=2 teacher/student internal distillation.
    proceed_when:
      - val_loss is non-increasing over the last two evals
      - format behavior is preserved on structured probes
      - no checkpoint or CUDA instability
  - id: l3_math_stretch
    command: uv run --no-sync elt-train --config configs/qwen35_4b_side_lora_math_aha_ilsd_l3.yaml --resume H:/elt_data/runs/qwen35_4b_side_lora_math_aha_ilsd_l2/last.pt
    purpose: Add one loop of pressure only after the L=2 adapter is stable.
    proceed_when:
      - L3 eval at L=3 is better than L=1 on held-out bridge math prompts
      - entropy floor and local consistency terms stay bounded
  - id: l3_stem_stretch
    command: uv run --no-sync elt-train --config configs/qwen35_4b_side_lora_stem_aha_ilsd_l3.yaml --resume H:/elt_data/runs/qwen35_4b_side_lora_stem_aha_ilsd_l2/last.pt
    purpose: Add one loop of pressure only after the L=2 adapter is stable.
    proceed_when:
      - L3 eval at L=3 is better than L=1 on held-out bridge STEM prompts
      - entropy floor and local consistency terms stay bounded
  - id: verified_output_self_distill
    command: generate high-L outputs, keep only verifier-passing traces, mix them with replay anchors, then SFT for a short adapter refresh
    purpose: Convert the useful high-loop outputs into low-loop behavior without accepting hallucinated traces.
    proceed_when:
      - selected outputs pass exact verifier or MCQ verifier
      - replay share is at least 25 percent
      - L=1 validation does not regress
  - id: bridge_grpo_after_distill
    command: run math/stem bridge GRPO configs after the verifier fix and adapter refresh
    purpose: Use GRPO for reward separation after looped self-distillation has made positive samples reachable.
    proceed_when:
      - reward_std remains non-zero
      - correct_rate is not stuck at zero over a 16-step window

