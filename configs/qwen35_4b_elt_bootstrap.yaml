model:
  backbone_kind: hf_qwen35_looped
  hf_model_path: huihui-ai/Huihui-Qwen3.5-4B-Claude-4.6-Opus-abliterated
  source_model_id: huihui-ai/Huihui-Qwen3.5-4B-Claude-4.6-Opus-abliterated
  language_only: true
  freeze_vision: true
  import_lm_head: true
  parity_dtype: fp32
  d_model: 2560
  n_unique_layers: 32
  n_heads: 16
  n_kv_heads: 4
  head_dim: 256
  d_ff: 9216
  max_seq_len: 262144
  rope_theta: 10000000.0
  tie_word_embeddings: false
  L_min: 1
  L_max: 1
  loop_bootstrap_L_max: 1
  hf_trainable_mode: norm_lm_head
  hf_trainable_top_layers: 0
  grad_checkpoint: false

ilsd:
  enabled: false

data:
  train_bin: H:/elt_data/bin/train.bin
  val_bin: H:/elt_data/bin/val.bin
  seq_len: 256
  tokenizer_path: H:/Qwen3.5-9B-official-hf

optim:
  kind: paged_adamw_8bit
  paged_bits: 8
  paged_percentile_clipping: 100

lr: 5.0e-5
min_lr: 5.0e-6
weight_decay: 0.1
beta1: 0.9
beta2: 0.95
eps: 1.0e-8
grad_clip: 1.0

warmup_steps: 100
total_steps: 2000
lr_schedule: cosine

micro_batch_size: 1
grad_accum_steps: 8

dtype: bf16

log_every: 10
eval_every: 200
save_every: 500
run_dir: H:/elt_data/runs/qwen35_4b_elt_bootstrap

rolling_ckpt_interval_sec: 300
rolling_ckpt_keep: 3

seed: 42
