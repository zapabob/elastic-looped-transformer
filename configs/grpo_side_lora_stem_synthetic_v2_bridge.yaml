# KL-constrained GRPO for Qwen3.5-4B side LoRA STEM synthetic v2 bridge lane.

model:
  backbone_kind: hf_qwen35_looped
  hf_model_path: huihui-ai/Huihui-Qwen3.5-4B-Claude-4.6-Opus-abliterated
  source_model_id: huihui-ai/Huihui-Qwen3.5-4B-Claude-4.6-Opus-abliterated
  language_only: true
  freeze_vision: true
  import_lm_head: true
  parity_dtype: bf16
  L_min: 1
  L_max: 1
  loop_bootstrap_L_max: 1
  hf_trainable_mode: lora
  hf_lora_rank: 16
  hf_lora_alpha: 32.0
  hf_lora_dropout: 0.02
  hf_lora_top_layers: 0
  hf_save_adapter_only: true
  hf_adapter_base_ckpt: H:/elt_data/runs/qwen35_4b_elt_bootstrap/last.pt
  grad_checkpoint: false

grpo:
  enabled: true
  init_ckpt: H:/elt_data/runs/qwen35_4b_side_lora_stem_sft_synthetic_gb/last.pt
  prompts_file: H:/elt_data/synthetic_v2_hard/stem_reasoning/benchmarks/synthetic_v2_bridge_stem_reasoning_val_cases.jsonl
  task: mcq_reasoning
  group_size: 2
  rollout_temperature: 0.9
  rollout_top_k: 40
  rollout_max_new_tokens: 160
  rollout_L: 1
  clip_eps: 0.2
  kl_beta: 0.03
  mu_steps: 1
  reward_model_ckpt: ""
  reward_alpha: 0.0
  verifier_beta: 1.0
  prompt_budget: 1024

data:
  train_bin: H:/elt_data/posttrain_synthetic/stem_reasoning/v1_gb/bin/train.bin
  val_bin: H:/elt_data/posttrain_synthetic/stem_reasoning/v1_gb/bin/val.bin
  seq_len: 256
  tokenizer_path: H:/Qwen3.5-9B-official-hf

optim:
  kind: adamw

lr: 4.0e-6
min_lr: 4.0e-7
weight_decay: 0.0
beta1: 0.9
beta2: 0.99
eps: 1.0e-8
grad_clip: 1.0
warmup_steps: 8
total_steps: 96
lr_schedule: cosine
micro_batch_size: 1
grad_accum_steps: 1
dtype: bf16
log_every: 1
eval_every: 24
save_every: 24
run_dir: H:/elt_data/runs/grpo_side_lora_stem_synthetic_v2_bridge
rolling_ckpt_interval_sec: 300
rolling_ckpt_keep: 3
seed: 494
