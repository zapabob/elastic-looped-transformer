# Code lane L=3 stretch stage. Resume from the L=2 aha adapter.
# Kept deliberately short/conservative because the first L3 run showed large
# teacher/student divergence late in the run.

model:
  backbone_kind: hf_qwen35_looped
  hf_model_path: huihui-ai/Huihui-Qwen3.5-4B-Claude-4.6-Opus-abliterated
  source_model_id: huihui-ai/Huihui-Qwen3.5-4B-Claude-4.6-Opus-abliterated
  language_only: true
  freeze_vision: true
  import_lm_head: true
  parity_dtype: bf16
  L_min: 1
  L_max: 3
  loop_bootstrap_L_max: 1
  hf_trainable_mode: lora
  hf_lora_rank: 16
  hf_lora_alpha: 32.0
  hf_lora_dropout: 0.03
  hf_lora_top_layers: 0
  hf_save_adapter_only: true
  hf_adapter_base_ckpt: H:/elt_data/runs/qwen35_4b_elt_bootstrap/last.pt
  grad_checkpoint: false

ilsd:
  enabled: true
  lambda_init: 0.35
  lambda_final: 0.03
  lambda_anneal_steps: 80
  warmup_steps: 8
  strict_student_below_teacher: true
  distill_teacher_temp: 1.25
  distill_uniform_mix: 0.001
  entropy_floor_weight: 0.012
  entropy_floor_start: 0.16
  entropy_floor_end: 0.08
  entropy_curvature_weight: 0.012
  logit_curvature_weight: 0.0
  logit_curvature_max_positions: 128
  uncertainty_entropy_min: 0.55
  uncertainty_top2_gap_max: 0.15
  local_consistency_weight: 0.012
  local_consistency_metric: cosine

data:
  train_bin: H:/elt_data/posttrain_synthetic/code/v1_gb/bin/train.bin
  val_bin: H:/elt_data/posttrain_synthetic/code/v1_gb/bin/val.bin
  seq_len: 128
  tokenizer_path: H:/Qwen3.5-9B-official-hf

optim:
  kind: adamw

lr: 1.0e-5
min_lr: 1.0e-6
weight_decay: 0.01
beta1: 0.9
beta2: 0.95
eps: 1.0e-8
grad_clip: 0.4
warmup_steps: 8
total_steps: 80
lr_schedule: cosine
micro_batch_size: 1
grad_accum_steps: 1
dtype: bf16
log_every: 5
eval_every: 20
eval_batches: 2
save_every: 40
run_dir: H:/elt_data/runs/qwen35_4b_side_lora_code_aha_ilsd_l3
rolling_ckpt_interval_sec: 600
rolling_ckpt_keep: 3
seed: 46111
