    included_path: training_data/synthetic_v2_hard
    generated_by:
      - src/elt_lm/synthetic_v2_hard.py
      - src/elt_lm/synthetic_v2_code_bridge.py
      - src/elt_lm/synthetic_v2_reasoning_bridge.py
      - src/elt_lm/verifiers.py
    cite:
      - https://github.com/zapabob/elastic-looped-transformer
      - https://arxiv.org/abs/2604.09168
      - https://arxiv.org/abs/2402.03300

